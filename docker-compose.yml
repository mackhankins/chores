x-env: &shared-env
  APP_ENV: production
  APP_DEBUG: "false"
  APP_URL: http://192.168.40.103:8088
  APP_KEY: # your APP_KEY here
  DB_CONNECTION: sqlite
  DB_DATABASE: /var/www/html/database/database.sqlite
  SESSION_DRIVER: database
  QUEUE_CONNECTION: database
  CACHE_STORE: database
  TWILIO_SID: # your Twilio SID here
  TWILIO_AUTH_TOKEN: # your Twilio auth token here
  TWILIO_MESSAGING_SERVICE_SID: # your Twilio messaging service SID here

x-volumes: &shared-volumes
  - sqlite-data:/var/www/html/database
  - app-storage:/var/www/html/storage

services:
  app:
    image: ghcr.io/mackhankins/chores:latest
    container_name: chores-app
    restart: unless-stopped
    ports:
      - "8088:80"
    environment:
      <<: *shared-env
    volumes: *shared-volumes

  scheduler:
    image: ghcr.io/mackhankins/chores:latest
    container_name: chores-scheduler
    restart: unless-stopped
    entrypoint: ["php", "/var/www/html/artisan", "schedule:work", "--no-interaction"]
    environment:
      <<: *shared-env
    volumes: *shared-volumes

  queue:
    image: ghcr.io/mackhankins/chores:latest
    container_name: chores-queue
    restart: unless-stopped
    entrypoint: ["php", "/var/www/html/artisan", "queue:work", "--sleep=3", "--tries=3", "--no-interaction"]
    environment:
      <<: *shared-env
    volumes: *shared-volumes

volumes:
  sqlite-data:
  app-storage:
