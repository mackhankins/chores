x-env: &shared-env
  APP_ENV: production
  APP_DEBUG: "true"
  APP_URL: http://192.168.40.103:8088
  APP_KEY: # your APP_KEY here
  DB_CONNECTION: sqlite
  DB_DATABASE: /data/database.sqlite
  SESSION_DRIVER: database
  QUEUE_CONNECTION: database
  CACHE_STORE: database
  MAIL_MAILER: smtp
  MAIL_HOST: smtp.gmail.com
  MAIL_PORT: 587
  MAIL_USERNAME: # your Gmail address
  MAIL_PASSWORD: # your Gmail app password
  MAIL_ENCRYPTION: tls
  MAIL_FROM_ADDRESS: # your Gmail address
  MAIL_FROM_NAME: Hankins Chores

x-volumes: &shared-volumes
  - /share/chores/data:/data
  - /share/chores/storage/logs:/var/www/html/storage/logs
  - /share/chores/storage/framework/sessions:/var/www/html/storage/framework/sessions

services:
  app:
    image: ghcr.io/mackhankins/chores:latest
    container_name: chores-app
    restart: unless-stopped
    ports:
      - "8088:80"
    environment:
      <<: *shared-env
    volumes: *shared-volumes

  scheduler:
    image: ghcr.io/mackhankins/chores:latest
    container_name: chores-scheduler
    restart: unless-stopped
    entrypoint: ["php", "/var/www/html/artisan", "schedule:work", "--no-interaction"]
    environment:
      <<: *shared-env
    volumes: *shared-volumes

  queue:
    image: ghcr.io/mackhankins/chores:latest
    container_name: chores-queue
    restart: unless-stopped
    entrypoint: ["php", "/var/www/html/artisan", "queue:work", "--sleep=3", "--tries=3", "--no-interaction"]
    environment:
      <<: *shared-env
    volumes: *shared-volumes

